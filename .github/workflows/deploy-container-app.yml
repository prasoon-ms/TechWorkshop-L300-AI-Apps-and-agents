name: Build and Deploy Container App

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  AZURE_CONTAINER_REGISTRY: '${{ secrets.AZURE_CONTAINER_REGISTRY }}'
  AZURE_CONTAINER_APP_NAME: '${{ secrets.AZURE_CONTAINER_APP_NAME }}'
  AZURE_RESOURCE_GROUP: '${{ secrets.AZURE_RESOURCE_GROUP }}'
  IMAGE_NAME: chat-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2.1.1
        with:
          creds: '${{ secrets.AZURE_CREDENTIALS }}'

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: '${{ env.AZURE_CONTAINER_REGISTRY }}'
          username: '${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}'
          password: '${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}'

      - name: Compose image name
        id: image
        run: echo "image=${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          push: true
          tags: '${{ steps.image.outputs.image }}'

      - name: Update Azure Container App
        env:
          FOUNDRY_ENDPOINT_SECRET: '${{ secrets.FOUNDRY_ENDPOINT }}'
          GPT_ENDPOINT_SECRET: '${{ secrets.gpt_endpoint }}'
          EMBEDDING_ENDPOINT_SECRET: '${{ secrets.embedding_endpoint }}'
          PHI_4_ENDPOINT_SECRET: '${{ secrets.phi_4_endpoint }}'
        run: |
          az config set extension.use_dynamic_install=yes_without_prompt

          az containerapp update \
            --name "${AZURE_CONTAINER_APP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --image "${{ steps.image.outputs.image }}" \
            --set-env-vars \
              FOUNDRY_ENDPOINT="${FOUNDRY_ENDPOINT_SECRET}" \
              GPT_ENDPOINT="${GPT_ENDPOINT_SECRET}" \
              EMBEDDING_ENDPOINT="${EMBEDDING_ENDPOINT_SECRET}" \
              PHI_4_ENDPOINT="${PHI_4_ENDPOINT_SECRET}"